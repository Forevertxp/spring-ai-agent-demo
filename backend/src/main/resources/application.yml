server:
  port: 8080

spring:
  application:
    name: store-agent

  ai:
    alibaba:
      api-key: ${DASHSCOPE_API_KEY:sk-your-key}
      chat:
        options:
          model: qwen-plus
          temperature: 0.7

# 日志配置
logging:
  level:
    com.hxy.agent: DEBUG
    org.springframework.ai: DEBUG

# 门店配置
store:
  list:
